steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/jetstream-indexer/worker:$BUILD_ID
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/jetstream-indexer/worker:latest
      - .
images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/jetstream-indexer/worker:$BUILD_ID
  - us-central1-docker.pkg.dev/$PROJECT_ID/jetstream-indexer/worker:latest
options:
  # e2-highcpu-8 cuts npm install + (for the web) next build from ~3 min to
  # ~45 s. Net cheaper per build because total minutes drop more than the
  # per-minute price increase.
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
